spring.application.name=servicio-calendario

# ==================================================================================
# Server
# ==================================================================================
server.port=${SERVER_PORT:5006}

# ==================================================================================
# Datasource
# ==================================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5437/smartbook_calendario}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================================================
# JPA / Hibernate
# ==================================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==================================================================================
# Pool Hikari
# ==================================================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ==================================================================================
# JWT — Resource Server (valida tokens emitidos por servicio-auth)
# ==================================================================================
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-chars-for-hs256-1234567890}

# ==================================================================================
# Clientes inter-servicio (para resolver el scope del calendario por rol)
# ==================================================================================
smartbook.client.gestion-estudiante.url=${ESTUDIANTE_URL:http://localhost:5002}
smartbook.client.gestion-academica.url=${ACADEMICA_URL:http://localhost:5003}

# ==================================================================================
# Swagger / OpenAPI
# ==================================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ==================================================================================
# Logging
# ==================================================================================
logging.level.cl.smartbook=INFO

# Actuator: solo health/info para el healthcheck de Docker
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
