spring.application.name=servicio-reportes

# ==================================================================================
# Server
# ==================================================================================
server.port=${SERVER_PORT:5008}

# ==================================================================================
# Datasource
# ==================================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5439/smartbook_reportes}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================================================
# JPA / Hibernate
# ==================================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================================================================================
# Pool Hikari
# ==================================================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ==================================================================================
# JWT (secreto — sin default visible; F2 configura el Resource Server completo)
# ==================================================================================
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-chars-for-hs256-1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================================================================================
# Clientes externos
# ==================================================================================
smartbook.client.auth.url=${AUTH_URL:http://localhost:5001}
smartbook.client.gestion-estudiante.url=${GESTION_ESTUDIANTE_URL:http://localhost:5002}
smartbook.client.gestion-academica.url=${ACADEMICA_URL:http://localhost:5003}
smartbook.client.anotacion.url=${ANOTACION_URL:http://localhost:5004}

# ==================================================================================
# Swagger / OpenAPI
# ==================================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ==================================================================================
# Logging
# ==================================================================================
logging.level.cl.smartbook=INFO
