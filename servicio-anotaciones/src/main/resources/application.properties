spring.application.name=anotacion

# ==================================================================================
# Server
# ==================================================================================
server.port=${SERVER_PORT:5004}

# ==================================================================================
# Datasource
# ==================================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/smartbook_anotacion}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================================================
# JPA / Hibernate
# ==================================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==================================================================================
# Pool Hikari
# ==================================================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ==================================================================================
# JWT — Resource Server (valida tokens emitidos por servicio-auth)
# ==================================================================================
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-chars-for-hs256-1234567890}

# ==================================================================================
# Swagger / OpenAPI
# ==================================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ==================================================================================
# URLs de servicios externos (cross-service via WebClient)
# ==================================================================================
smartbook.client.auth.url=${AUTH_URL:http://localhost:5001}
smartbook.client.gestion-estudiante.url=${GESTION_ESTUDIANTE_URL:http://localhost:5002}

# ==================================================================================
# Logging
# ==================================================================================
logging.level.cl.smartbook=INFO
