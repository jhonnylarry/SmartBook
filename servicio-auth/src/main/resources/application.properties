spring.application.name=servicio-auth

# Config de DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartbook_auth}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Config JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Pool HIKARI
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

server.port=${SERVER_PORT:5001}

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha

# JWT — INSEGURO en dev; en prod sobreescribir con JWT_SECRET en .env (min 32 chars para HS256)
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-chars-for-hs256-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
