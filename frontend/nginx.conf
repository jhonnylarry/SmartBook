server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Límite de subida (las llamadas /api/ pasan por este proxy; PDFs hasta 10 MB)
    client_max_body_size 15M;

    # ── Security headers (defensa básica del frontend) ──
    # OJO: nginx NO hereda add_header dentro de un location que tenga su propio
    # add_header, por eso se repiten en "location /" (el que sirve el HTML).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP relajada (permite estilos/handlers inline que usa la app); endurecer es backlog.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:4200 http://localhost:5050; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Health check
    location /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # API Gateway proxy — todas las llamadas /api/* van al gateway
    # (sin barra final en proxy_pass para preservar el prefijo /api/v1/...)
    # No se usa en el flujo actual: el browser pega directo a http://localhost:5000.
    location /api/ {
        proxy_pass http://api-gateway:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Assets estáticos — caché largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # SPA fallback — siempre sirve index.html para rutas Angular
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # Re-declarados aquí porque este location define su propio add_header
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:4200 http://localhost:5050; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }
}
